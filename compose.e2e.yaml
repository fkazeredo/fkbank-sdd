# Ephemeral end-to-end stack. Publishes the whole app on a SINGLE origin
# http://127.0.0.1:8090: an nginx edge serves the built SPA and reverse-proxies the auth/API
# paths to the backend, so the browser sees one same-origin host and no CORS/cookie special
# cases exist only in tests.
#
# `docker compose --wait` relies on the healthchecks below (see tools/quality/verify-e2e).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: e2e
      APP_DB_URL: jdbc:postgresql://db:5432/app
      APP_DB_USERNAME: app
      APP_DB_PASSWORD: app
      # The bureau is a container on this network, not a process on the host, so the default
      # loopback address the application ships with would reach nothing here.
      FKBANK_BUREAU_BASE_URL: http://bureau:9101
      # The other half of the callback signature. It must equal the emulator's BUREAU_HMAC_SECRET
      # below; a mismatch surfaces as every callback being rejected as a forgery.
      FKBANK_BUREAU_HMAC_SECRET: dev-bureau-secret
    depends_on:
      db:
        condition: service_healthy
      bureau:
        condition: service_healthy
    healthcheck:
      # Point this at a route that proves the app is SERVING, not that it is open. A protected
      # route answering 401 is a perfectly good liveness signal — hence `grep -qE ' (401|200) '`
      # and no `wget -f`-style failure on the 401, which would treat it as an error.
      #
      # busybox `wget`, not `curl`: the runtime image is JRE-on-Alpine and ships no curl, so a
      # curl-based check fails with "curl: not found" and reports the application unhealthy
      # while it is serving perfectly. wget exits non-zero on a 401, but the pipeline's status
      # is grep's, so the check still passes.
      #
      # 127.0.0.1, never `localhost`: inside the container localhost resolves to IPv6 ::1
      # first, where the server is not listening.
      test: ["CMD-SHELL", "wget -q -S -O /dev/null http://127.0.0.1:8080/api/me 2>&1 | grep -qE ' (401|200) '"]
      interval: 5s
      timeout: 3s
      retries: 40

  bureau:
    build:
      context: ./emulators/bureau
    environment:
      # Container to container over the compose network: the emulator posts its callback straight
      # at the backend, which is the whole point of running it as a service rather than a stub.
      BUREAU_CALLBACK_URL: http://backend:8080/api/webhooks/bureau
      BUREAU_DEFAULT_SCENARIO: approve
      # Must equal the backend's FKBANK_BUREAU_HMAC_SECRET above, or every callback is correctly
      # rejected as a forgery and the timed-out journey never completes.
      BUREAU_HMAC_SECRET: dev-bureau-secret
      # Fixed so a scenario that fails in CI fails identically on a developer's machine.
      BUREAU_SEED: "20260720"
    ports:
      # Published, unlike the backend, because the E2E suite drives the control API from the host
      # to choose what the bureau will answer for the journey it is about to walk. This is the
      # emulator's own surface, not the application's, so the single-origin rule is untouched.
      - "127.0.0.1:9101:9101"
    healthcheck:
      # The control surface answers 200 as soon as the service is really serving; there is no
      # protected route here to probe the way the backend's check does. 127.0.0.1, never
      # `localhost`: inside the container localhost resolves to IPv6 ::1 first.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9101/control/scenario"]
      interval: 5s
      timeout: 3s
      retries: 40

  edge:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, never `localhost`: inside the container localhost resolves to IPv6 ::1 first,
      # where nginx is not listening. This trap costs an hour every time it is rediscovered.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
