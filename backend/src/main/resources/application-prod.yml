# Production. Every secret arrives from the environment; nothing sensitive is committed.
#
# ProductionSecretsGuard refuses to start this profile while any development default is still in
# place, so a misconfigured boot fails before a port is ever opened rather than serving traffic
# with a development secret enabled.
fkbank:
  bureau:
    base-url: ${FKBANK_BUREAU_BASE_URL:}
    hmac-secret: ${FKBANK_BUREAU_HMAC_SECRET:}

spring:
  security:
    oauth2:
      authorizationserver:
        issuer: ${FKBANK_ISSUER:}

logging:
  level:
    org.springframework.security: WARN
