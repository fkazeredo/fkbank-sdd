spring:
  application:
    name: fkbank-backend

  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://127.0.0.1:5432/app}
    username: ${APP_DB_USERNAME:app}
    password: ${APP_DB_PASSWORD:app}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate never alters it: an applied migration is immutable
      # and a fix is a new migration.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          # The database stores UTC; timezone is a presentation-edge concern only.
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  modulith:
    # Only explicitly annotated domain.<bounded-context> packages are application modules;
    # the application and infra roots are adapters, not modules.
    detection-strategy: explicitly-annotated
    events:
      jdbc:
        schema-initialization:
          # The event publication table is created by a migration like every other table, so
          # the outbox that will hold unprocessed business facts is reviewed as schema rather
          # than appearing at startup.
          enabled: false

  security:
    oauth2:
      authorizationserver:
        issuer: ${FKBANK_ISSUER:http://127.0.0.1:8090}
        client:
          fkbank-spa:
            registration:
              client-id: fkbank-spa
              # A browser application cannot keep a secret, so it is a public client and
              # proves possession of the authorization code with PKCE instead.
              client-authentication-methods:
                - none
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - ${FKBANK_SPA_REDIRECT_URI:http://127.0.0.1:8090/auth/callback}
              post-logout-redirect-uris:
                - ${FKBANK_SPA_POST_LOGOUT_URI:http://127.0.0.1:8090/}
              scopes:
                - openid
                - profile
            require-authorization-consent: false
            require-proof-key: true

logging:
  structured:
    format:
      # One JSON object per log line, correlationId (and any other MDC entry) included as a
      # top-level property (logging.structured.json.context.include below), exceptions in
      # dedicated error.* fields instead of folded into the message - never a hand-rolled
      # encoder, this is Spring Boot's own structured-logging support.
      console: ecs
    json:
      context:
        include: true

management:
  endpoints:
    web:
      exposure:
        # Only these two are web-exposed: health is the public liveness signal, prometheus is
        # the scrape target (bearer-token protected, like the rest of the API).
        include: health,prometheus

server:
  # The application always runs behind the nginx edge, which terminates the origin the browser
  # actually used. Without this, self-referencing redirects and the OIDC issuer are built from
  # the container's own address instead of the public one.
  forward-headers-strategy: framework
  error:
    # An error body must never hand an unauthenticated caller a stack trace or the internals
    # behind it.
    include-stacktrace: never
    include-message: never
