# Local development: PostgreSQL only. Run the backend with the `dev` profile against it.
#
# Bound to 127.0.0.1 rather than 0.0.0.0 on purpose: it keeps the database off the local network
# and avoids clashing with another project on the same box. Rename `app` throughout to your
# project's name.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - app-dev-db:/var/lib/postgresql/data

  # Add opt-in emulators/stubs for external integrations here, behind a profile so they only
  # start when asked for:
  #
  #   some-emulator:
  #     build: { context: ./emulators/some-emulator }
  #     profiles: ["emulators"]
  #     ports: ["127.0.0.1:9101:9101"]
  #
  #   docker compose -f compose.dev.yaml --profile emulators up

volumes:
  app-dev-db:
