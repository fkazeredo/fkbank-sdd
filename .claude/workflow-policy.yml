# RELAY workflow policy -- concrete configuration kept OUT of the core documents
# (models and aliases may change here without touching CLAUDE.md, skills or rules).

models:
  standard: sonnet   # default for every phase at R0-R2, and for /pr, /release, /workflow-status at any risk
  strong: opus       # /spec, /design-slice, /build, /qa at R3-R4; /review-pr and /fix-pr when evidence requires

effort:
  default: xhigh
  critical_design: xhigh          # /design-slice at R3-R4
  workflow_status: xhigh
  max_requires_human: true        # max remains an explicit operator choice

orchestration:
  mode: ultracode
  effort: xhigh
  dynamic_workflows: unrestricted
  agent_teams: unrestricted
  subagents: unrestricted
  parallel_implementation: controlled     # safe ownership + integration, not a numeric cap
  parallel_integration: accountable       # one accountable integrator owns the merged slice result
  background_tasks: unrestricted
  repository_numeric_limits: none


escalation:                        # evidence-based, never anxiety-based
  raise_model_when:
    - context was complete AND the failure is a reasoning failure
    - math / concurrency / declared invariant is involved
    - the same error repeats after a context fix
  do_not_raise_when:
    - a file or step was skipped        # fix the instruction or the reading list
    - the skill or spec was ambiguous   # fix the skill or the spec
    - a gate was missing                # add the gate
    - the slice was too big             # split the slice

limits:                            # outcome bounds -- see .claude/rules/workflow-conventions.md
  qa_runs_per_slice: 2
  qa_rework_cycles: 1
  ci_auto_fixes: 1
  flaky_retry: 1                   # diagnosis only -- passing on retry does not re-trust the test
  same_failure_attempts: 2
  spec_interview_blocks: 3
  ci_watch_minutes: 15
  merges_by_agent: 0
  force_pushes: 0

slice_gates:                       # binding implementation gates (tools/workflow/check-slice-gate)
  fit_gate: binding                # TOO_LARGE / ambiguous never enters implementation
  fit_evidence: detected signal ids plus exceptional unsafe-condition flag
  dev_verified_requires:
    - verify_slice_pass
    - applicable_e2e_pass
    - acceptance_evidence_complete
    - no_skipped_mandatory_gate
  qa_preflight: required           # runs before independent QA; failure returns to BUILDING, consumes no QA run
  checkpoint_state: CHECKPOINTED    # clean-context restart; resume via the same top-level command --resume

resumable_context_states:          # non-success states the stop-guard accepts as legitimate resumable stops
  - CHECKPOINTED


state_machine:
  operator_commands:
    deliver_spec: /deliver-spec
    close_sprint: /close-sprint
    deliver_sprint: /deliver-sprint       # optional whole-Sprint loop; ends with the close_sprint check
  normal_operator_flow:
    - /deliver-spec                       # repeat per spec
    - /close-sprint                       # Sprint-closure gate (heavy assembled-system battery + Security Assurance + draft notes); no release work
  close_sprint_owns_release: false        # /close-sprint verifies the integrated candidate and drafts notes; /release is a separate owner-driven command
  automatic_workers:
    qa: qa-engineer
    review: pr-reviewer
    security: security-assurance-engineer
  human_wait_states:
    - HUMAN_DECISION_REQUIRED
    - AWAITING_HUMAN_MERGE
    - AWAITING_RISK_ACCEPTANCE
    - AWAITING_PRODUCTION_AUTHORIZATION
    - READY_FOR_OWNER_RELEASE
  retryable_external_states:
    - CI_PENDING
    - EXTERNAL_SYSTEM_UNAVAILABLE
  terminal_failure_states:
    - BLOCKED
  machine_approves_derived_plan: true
  spec_invocation_approves_exact_hash: true

security_gate:                     # final-delivery assurance policy
  track_document: docs/security/SECURITY-ASSURANCE-TRACK.md
  track_approved: true             # owner-approved 2026-07-17; execution evidence is still mandatory
  applicability: Sprint closure or release candidate containing at least one R3/R4 slice
  r0_r2_release: SECURITY_NOT_APPLICABLE with recorded justification
  r3_r4_internal_candidate: approved track executes; policy-bounded Low/Medium observations continue automatically; only material residual risk requires a human decision
  r3_r4_production_release: BLOCKED until the approved track executes with SECURITY_VERIFIED
  note: risk acceptance NEVER produces SECURITY_VERIFIED
  production_release_definition: >
    A release destined for an environment exposed to end users. Every sprint release
    before that milestone is an internal pilot/pre-release.

qa_paths:                          # QA-owned write paths (bidirectional boundary; hook-enforced)
  - "**/src/test/**/acceptance/**"
  - "**/src/test/**/contract/**"
  - "frontend/e2e/**"
  - "qa/**"
  - "docs/tests/**"
  - "docs/qa/**"
  - ".claude/runtime/**"

releaser_paths:
  release_prepare:
    - "pom.xml"
    - "**/pom.xml"
    - "package.json"
    - "**/package.json"
    - "**/package-lock.json"
    - "docs/CHANGELOG.md"
    - "docs/release-notes/**"
    - ".claude/runtime/**"
  release_finalize:
    - "pom.xml"
    - "**/pom.xml"
    - "package.json"
    - "**/package.json"
    - "**/package-lock.json"
    - "docs/CHANGELOG.md"
    - "docs/release-notes/**"
    - ".claude/runtime/**"

hotfix_security_minimum:
  - static_analysis
  - secrets
  - dependencies
  - authorization
  - regression_tests
  - human_risk_decision
  - post_release_assurance_when_deferred
