# The edge that makes the whole application one origin.
#
# The browser sees a single host (http://127.0.0.1:8090): the SPA, the API and the
# Authorization Server all appear same-origin, so there are no CORS rules, no third-party
# cookie behaviour and no redirect-URI mismatch that exist only in tests. What E2E exercises is
# therefore the same shape production serves.
server {
  listen 8090;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Do not advertise the server version; it tells an attacker which CVEs to try first.
  server_tokens off;

  # Security response headers.
  #
  # `always`, so they are sent on error responses too — a 401 or a 404 is rendered by the browser
  # like any other page and needs the same protection.
  #
  # NGINX INHERITANCE TRAP: add_header directives are NOT merged. A location block that declares
  # even one add_header of its own discards every header inherited from this level. The two cache
  # locations below therefore repeat this whole set; if you add a header here, add it there too,
  # and if you introduce a new location with add_header, it needs them as well.
  #
  # The CSP allows inline styles because Angular injects component styles as <style> elements at
  # runtime; removing that concession requires build-time nonces or hashes and would break the
  # rendered application today. Scripts get no such concession — 'self' only, which is the half
  # that actually stops injected-script attacks. frame-ancestors 'none' is what forbids framing;
  # X-Frame-Options repeats it for browsers that predate CSP level 2.
  set $security_csp "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'";
  add_header Content-Security-Policy $security_csp always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  # Never cache the entry point: a stale index.html would keep pointing browsers at hashed
  # bundles that no longer exist after a deploy.
  location = /index.html {
    # Repeated, not inherited — see the trap noted above.
    add_header Content-Security-Policy $security_csp always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cache-Control "no-store" always;
  }

  # Hashed build artifacts are immutable by construction.
  location /assets/ {
    expires 1y;
    # Repeated, not inherited — see the trap noted above.
    add_header Content-Security-Policy $security_csp always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cache-Control "public, immutable" always;
  }

  location /api/ {
    proxy_pass http://backend:8080;
    # $http_host, NOT $host: $host drops the port, so the backend builds every self-referencing
    # absolute redirect without one and sends the browser to :80, where nothing listens. That
    # breaks the whole login journey while every direct-to-backend test still passes, because
    # those never traverse this proxy.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # The OAuth2/OIDC surface of the embedded Authorization Server. It must sit on the same
  # origin as the SPA, because the issuer in the tokens has to match the address the browser
  # actually used.
  location ~ ^/(oauth2|login|logout|\.well-known)(/|$) {
    proxy_pass http://backend:8080;
    # $http_host, NOT $host: $host drops the port, so the backend builds every self-referencing
    # absolute redirect without one and sends the browser to :80, where nothing listens. That
    # breaks the whole login journey while every direct-to-backend test still passes, because
    # those never traverse this proxy.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # Actuator, the OpenAPI document and the Swagger UI all live on the backend, not the SPA.
  # Without this block every one of these paths falls through to the catch-all below and gets
  # served index.html instead - a 200 that looks fine to a shallow health check while actually
  # returning the Angular shell instead of metrics or the API document.
  #
  # actuator/swagger-ui are boundary-anchored (a segment or exact match), matching the
  # oauth2/login block above, so an unrelated path merely prefixed with the same letters (e.g.
  # /actuatorXYZ) falls through to the SPA instead of being proxied. v3/api-docs is
  # deliberately left unanchored: springdoc serves real, legitimate sibling paths under that
  # same prefix with no separator (/v3/api-docs.yaml, /v3/api-docs/swagger-config), and the
  # backend's own default-deny already rejects anything else that happens to match.
  location ~ ^/(actuator(/|$)|v3/api-docs|swagger-ui(/|$|\.html)) {
    proxy_pass http://backend:8080;
    # $http_host, NOT $host: $host drops the port, so the backend builds every self-referencing
    # absolute redirect without one and sends the browser to :80, where nothing listens. That
    # breaks the whole login journey while every direct-to-backend test still passes, because
    # those never traverse this proxy.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # Client-side routing: unknown paths are application routes, not missing files.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
