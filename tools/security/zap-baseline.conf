# OWASP ZAP baseline policy for the security-assurance track (family 6).
# Consumed by compose.security.yaml: `zap-baseline.py -c zap-baseline.conf ... -I`.
#
# Format (tab-separated): <ruleId>	<WARN|FAIL|IGNORE>	(<rule name>)
#
# Policy shape, and why:
#  - The scan runs with -I, so WARN never breaks the build. That makes the FAIL list the real
#    release gate, and it is chosen deliberately: every rule below marked FAIL is one where a
#    hit on a serious web application is a defect, not a discussion.
#  - Rules absent from this file default to WARN. They still land in the report and still have
#    to be dispositioned by the security-assurance engineer under the track's finding policy —
#    "not gating" is not the same as "not reviewed".
#  - IGNORE is used sparingly, each with its justification on the line above. There is no
#    blanket suppression: an ignored rule is one that is structurally inapplicable or a known
#    false positive for this stack, never one that is merely inconvenient.
#
# TUNING THIS FILE FOR YOUR PROJECT: the FAIL list below is a strong default for any
# authenticated web application. Re-check the IGNORE block in particular — those four entries
# are justified by an SPA + JSON-API shape, and a different front end may make them relevant.
# Downgrading a FAIL to make a red scan go green is a gate weakening: it is an owner decision
# (see .claude/rules/human-decision-gate.md), not a maintenance edit.

# --- Response security headers: FAIL. Cheap to set, and their absence is a real finding. ---
10038	FAIL	(Content Security Policy (CSP) Header Not Set)
10020	FAIL	(Missing Anti-clickjacking Header)
10021	FAIL	(X-Content-Type-Options Header Missing)
10063	FAIL	(Permissions Policy Header Not Set)

# --- Disclosure and injection classes that are defects outright. ---
10023	FAIL	(Information Disclosure - Debug Error Messages)
10024	FAIL	(Information Disclosure - Sensitive Information in URL)
10028	FAIL	(Open Redirect)
10033	FAIL	(Directory Browsing)
10045	FAIL	(Source Code Disclosure)
10048	FAIL	(Remote Code Execution - Shell Shock)
10062	FAIL	(PII Disclosure)
90022	FAIL	(Application Error Disclosure)

# --- Session handling: a leaked or cross-site-replayable session is a direct compromise. ---
3	FAIL	(Session ID in URL Rewrite)
10054	FAIL	(Cookie Without SameSite Attribute)
90033	FAIL	(Loosely Scoped Cookie)

# --- Reviewed, reported, but not gating. ---
# HSTS only fires over HTTPS; an ephemeral plain-HTTP stack behind the edge cannot assert
# anything here. TLS posture is a deployment control, verified elsewhere.
10035	WARN	(Strict-Transport-Security Header Not Set)
# Passive form heuristic. A bearer-token authenticated API makes ZAP's "no hidden token in the
# form" signal misread an SPA. CSRF posture is proven by the authorization-matrix control
# (track family 5), not by this rule — which is why it reports but does not gate.
10202	WARN	(Absence of Anti-CSRF Tokens)
# Spectre-isolation headers (COOP/COEP/CORP) are a separate hardening step from the CSP set
# above; kept visible so the gap stays on the record.
90004	WARN	(Insufficient Site Isolation Against Spectre Vulnerability)
# Cache-control on authenticated responses genuinely matters, but the rule also fires across
# static SPA assets. Kept as WARN so each hit is dispositioned rather than auto-failed.
10015	WARN	(Re-examine Cache-control Directives)
# Real but low-severity: an nginx edge advertises its version by default. Listed explicitly
# rather than left to the default so the gap is on the record as a known, tracked edge-hardening
# item (`server_tokens off`) instead of quietly riding the default action.
10036	WARN	(Server Leaks Version Information via "Server" HTTP Response Header Field)

# --- IGNORE: structurally inapplicable or known false positives for an SPA + JSON API. ---
# Informational only: it reports that the target IS a JavaScript application. That is the
# architecture, by design — not a finding.
10109	IGNORE	(Modern Web Application)
# Informational cache classification of static SPA bundles; the actionable half of this concern
# is covered by 10015 above, which stays enabled.
10049	IGNORE	(Non-Storable Content)
# Matches any 10-digit integer, so it fires on entity ids and minor-unit amounts that a
# data-heavy API emits constantly. Pure false-positive generator against such payloads.
10096	IGNORE	(Timestamp Disclosure)
# Fires on content-hashed bundle filenames (main.<hash>.js) — a build-output naming convention,
# not a disclosed credential or digest.
10097	IGNORE	(Hash Disclosure)
# Reports on the SCANNER's version, not on the product under test. The ZAP image is pinned by
# digest on purpose (reproducible audit verdicts), so this would warn on every run forever;
# upgrading the pin is a deliberate maintenance decision, not a finding about the product.
10116	IGNORE	(ZAP is Out of Date)
